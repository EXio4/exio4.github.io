<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages SPA: stash the full URL and redirect to root.
      sessionStorage.setItem('spa-redirect', window.location.href);
      window.location.replace(window.location.origin + '/');
    </script>
  </head>
  <body></body>
</html>
